spring:
#  profiles:
#    active: local

  config:
    import:
      - classpath:application-aws.yml

  application:
    name:
      Achiva

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_MmVclnRmP
      client:
        registration:
          cognito:
            client-id: ${COGNITO_CLIENT_ID}
            client-secret: ${COGNITO_CLIENT_SECRET}
            scope:
              - email
              - openid
              - phone
            redirect-uri: "{baseUrl}/login/oauth2/code/cognito"
            client-name: Cognito
        provider:
          cognito:
            issuer-uri: https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_MmVclnRmP
            user-name-attribute: username

app:
  security:
    link-token-secret: ${LINK_TOKEN_SECRET}

    link-token-expiry: 300  # 초 단위 (5분)

